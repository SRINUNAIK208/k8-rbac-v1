apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: roboshop
  name: roboshop-sa 
rules:
- apiGroups: ["*"]
  resources: ["*"]
  verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
 namespace: roboshop
 name: roboshop-sa
subjects:
- kind: ServiceAccount
  name: roboshop-mysql-secret-reader 
  namespace: roboshop
roleRef:
  kind: Role
  name: roboshop-sa
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: Pod
metadata:
  name: aws-cli 
spec:
 serviceAccount: roboshop-mysql-secret-reader
 containers: 
 - name: aws-cli
   image: amazon/aws-cli
   command: ["sleep", "10000"]